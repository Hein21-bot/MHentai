services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: ./backend/.env

  admin-frontend:
    build: ./admin-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  user-frontend:
    build: ./user-frontend
    restart: unless-stopped
    ports:
      - "5172:80"
    depends_on:
      - backend
