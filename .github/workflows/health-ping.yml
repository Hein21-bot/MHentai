name: Backend Health Ping

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call backend health endpoint
        run: |
          if [ -z "${{ secrets.BACKEND_HEALTH_URL }}" ]; then
            echo "ERROR: Set the BACKEND_HEALTH_URL repository secret to your Render backend health endpoint."
            exit 1
          fi
          curl --fail --silent --show-error --max-time 20 "${{ secrets.BACKEND_HEALTH_URL }}"
